# karyotype定义染色体的名字、ID、起始位置信息，是绘制图的根本
karyotype = karyotype.drc.txt2

# 定义显示的染色体之间的间距，为图形半径的0.5% (r代表radius，半径)
<ideogram>
<spacing>
default = 0.005r
</spacing>
# 染色体区域的绘制位置，默认所有染色体都处于远离圆心同样距离的位置，这里设置的是图形半径的0.9倍的位置
radius = 0.85r
# 改变染色体在circos环中内半径大小，染色体区域的宽度，可以是相对图形半径，也可以说绝对像素值
thickness = 100p
# 染色体区域填充颜色
fill = yes
#color=set3-10-qual,set3-10-qual
# 染色体边的颜色和宽度
stroke_color = 121,168,208
stroke_thickness = 10p
# 显示染色体标签名字
show_label = yes #展示label
#label_font = default # 字体
label_font = bold
# ideogram外圈再加总半径的0.05
label_radius = dims(ideogram,radius) + 0.1r #位置
# 如果想把label标记在圈里可以写，外圈半径+内圈半径除以2
# label_rdius = (dims(ideogram,radius_outer)+dims(ideogram,radius_inner))/2
label_size = 150 # 字体大小
# label与圈平行
label_parallel = yes # 是否平行
# 格式
label_format = eval(sprintf("%s",var(chr))) # 格式
</ideogram>

chromosomes_units = 1000000
show_ticks = yes
show_tick_labels = yes

<ticks>
# ticks块定义了全局水平的tick的属性
# ticks出现的位置
radius           = dims(ideogram,radius_outer)
# 这个值的设置与chromosomes_units是没有任何关系的
# 比如当前位置是10,000,000, 乘以multiplier (1e-6)就是10
multiplier       = 1e-6
# ticks颜色、粗细、大小
color            = black
thickness        = 10p
size             = 50p
# 默认所有染色体都显示, 放置在ticks块中有效
chromosomes_display_default=yes
# 不在任何染色体显示, 放置在ticks块中有效
#chromosomes_display_default=no

<tick>
# spacing定义多大间距一个tick
spacing        = 25u
show_label     = yes
label_size     = 100p
# # label的偏移量
label_offset   = 50p
label_font = bold
# # %d, %.nf
format         = %d
#chromosomes=Chr1;Chr2;Chr3
</tick>

# 5u的间隔，定义小的ticks
#<tick>
#spacing        = 10u
#color          = grey
#size           = 10p
# # 定义在哪些染色体显示ticks，哪些区域不显示
# chromosomes=-hs1;-hs14;-hs6;-hs2:0-100;-hs3:100-)
#</tick>


</ticks>

<image>
dir*    = .    # 输出文件夹
radius* = 5000p # 图片半径
svg*    = no   # 是否输出svg
angle_offset* = -90
<<include etc/image.conf>>
</image>



